<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .header1 {
    z-index: 10;
    height: 80px;
    width: 100%;
    background-color: rgb(238, 224, 255);
    box-sizing: border-box;

    display: flex;
    justify-content: space-between; /* Um item à esquerda, outro à direita */
    align-items: center; /* Centraliza verticalmente os itens */
    padding: 10px 30px; /* Espaçamento interno */
    font-weight: bolder;
    font-family: monospace;
}

.box {
    position: relative; /* Mantém o controle de sua posição dentro do pai */
    width: 800px;
    height: auto;
    z-index: 11;
    margin: 0; /* Remove margens laterais */
    display: flex;
    flex-direction: column;
    background-color: rgba(255, 0, 0, 0.5);
    transition: width 0.5s; /* Suaviza o redimensionamento */
}

.box:hover {
    width: 400px; /* Diminui apenas o lado direito */
}

.item-direita {
    background-color: rgba(0, 0, 255, 0.5); /* Apenas para visualização */
    padding: 10px;
    font-family: monospace;
}

    </style>
</head>
<body>
    <div class="header1">
        <!-- Item à esquerda -->
        <div class="box">
            Eu estou à esquerda e diminuo apenas pelo lado direito!
        </div>
        <!-- Item à direita -->
        <div class="item-direita">
            Eu estou à direita!
        </div>
    </div>
    
</body>
</html>
