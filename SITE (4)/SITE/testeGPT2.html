<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transição Simulada</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .search-bar {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #444;
            padding: 10px;
            transition: all 0.3s ease; /* Suaviza transform e top */
        }

        header.compacto .search-bar {
            top: 0; /* Movemos a barra para o topo */
            transform: translateX(0); /* Remove o deslocamento horizontal */
            width: 100%; /* Ajustamos a largura */
        }

        main {
            margin-top: 120px;
            padding: 20px;
            height: 900px;
        }
    </style>
</head>
<body>
    <header>
        <div>Logo</div>
        <div>Menu</div>
        <div class="search-bar">
            <input type="text" placeholder="Pesquisar..." style="width: 100%; padding: 8px;">
        </div>
    </header>
    <main>
        <p>Conteúdo principal da página...</p>
        <p>Role para baixo para ver a barra de pesquisa se juntar ao header!</p>
    </main>

    <script>
        const header = document.querySelector('header');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) {
                header.classList.add('compacto'); // Adiciona a classe para simular a transição
            } else {
                header.classList.remove('compacto'); // Remove a classe para voltar ao estado original
            }
        });
    </script>
</body>
</html>
